<script>
document.addEventListener("DOMContentLoaded", function(){

  function showPlayAd(url){
    const overlay = document.getElementById("play-ad-overlay");
    const playBtn = document.getElementById("playBtn");
    const closeBtn = document.getElementById("playCloseBtn");
    const btnContainer = document.getElementById("playBtnContainer");
    const countdownEl = document.getElementById("playCountdown");

    overlay.style.display = "flex";
    btnContainer.style.display = "none";
    closeBtn.style.display = "none";

    playBtn.href = url;

    let timeLeft = 5;
    countdownEl.textContent = timeLeft;

    const timer = setInterval(()=>{
      timeLeft--;
      countdownEl.textContent = timeLeft;

      if(timeLeft <= 0){
        clearInterval(timer);
        btnContainer.style.display = "block";
      }
    },1000);

    setTimeout(()=>{ closeBtn.style.display = "block"; },8000);

    const autoClose = setTimeout(()=>{
      overlay.style.display = "none";
    },20000);

    closeBtn.onclick = ()=>{
      overlay.style.display = "none";
      clearTimeout(autoClose);
    };
  }

  document.addEventListener("click", function(e){
    const target = e.target.closest(".play-btn-trigger");
    if(!target) return;

    const url = target.getAttribute("data-url");
    if(!url) return;

    e.preventDefault();
    showPlayAd(url);
  });

});
</script>

</body>
</html>
